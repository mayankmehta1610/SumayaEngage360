services:
  postgres:
    image: postgres:16-alpine
    container_name: engage360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: engage360
      POSTGRES_USER: engage360
      POSTGRES_PASSWORD: engage360
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engage360 -d engage360"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - engage360-postgres-data:/var/lib/postgresql/data

volumes:
  engage360-postgres-data:
